name: Nuro Vault Competition Engine CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'nuro-vaults/**'
  pull_request:
    branches: [main]
    paths:
      - 'nuro-vaults/**'
  workflow_dispatch:
    inputs:
      deploy_network:
        description: 'Network to deploy to'
        required: true
        default: 'baseSepolia'
        type: choice
        options:
          - baseSepolia
          - base

env:
  NODE_VERSION: '20'
  WORKING_DIR: './nuro-vaults'

jobs:
  # ─────────────────────────────────────────────────────────
  # JOB 1: Lint + Compile
  # ─────────────────────────────────────────────────────────
  build:
    name: Compile Contracts
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile contracts
        run: npx hardhat compile

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contract-artifacts
          path: ${{ env.WORKING_DIR }}/artifacts
          retention-days: 7

  # ─────────────────────────────────────────────────────────
  # JOB 2: Test suite
  # ─────────────────────────────────────────────────────────
  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: contract-artifacts
          path: ${{ env.WORKING_DIR }}/artifacts

      - name: Run tests (Hardhat fork)
        run: npx hardhat test --network hardhat
        env:
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}

      - name: Gas report
        run: npx hardhat test --network hardhat
        env:
          REPORT_GAS: true
          ALCHEMY_API_KEY: ${{ secrets.ALCHEMY_API_KEY }}

  # ─────────────────────────────────────────────────────────
  # JOB 3: Deploy to Base Sepolia (on push to develop, or manual)
  # ─────────────────────────────────────────────────────────
  deploy-testnet:
    name: Deploy to Base Sepolia
    runs-on: ubuntu-latest
    needs: test
    if: |
      github.ref == 'refs/heads/develop' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_network == 'baseSepolia')
    environment: testnet
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: contract-artifacts
          path: ${{ env.WORKING_DIR }}/artifacts

      - name: Deploy Step 1 - AdminController
        run: npx hardhat run scripts/deploy/01_deploy_admin.ts --network baseSepolia
        env:
          DEPLOYER_PRIVATE_KEY:    ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          ALCHEMY_API_KEY:         ${{ secrets.ALCHEMY_API_KEY }}
          CASHLY_MULTISIG:         ${{ secrets.CASHLY_MULTISIG }}
          BASESCAN_API_KEY:        ${{ secrets.BASESCAN_API_KEY }}

      - name: Deploy Step 2 - Core Contracts
        run: npx hardhat run scripts/deploy/02_deploy_core.ts --network baseSepolia
        env:
          DEPLOYER_PRIVATE_KEY:    ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          ALCHEMY_API_KEY:         ${{ secrets.ALCHEMY_API_KEY }}
          CASHLY_MULTISIG:         ${{ secrets.CASHLY_MULTISIG }}
          BASESCAN_API_KEY:        ${{ secrets.BASESCAN_API_KEY }}

      - name: Deploy Step 3 - Lottery + Adapters
        run: npx hardhat run scripts/deploy/03_deploy_lottery.ts --network baseSepolia
        env:
          DEPLOYER_PRIVATE_KEY:             ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          ALCHEMY_API_KEY:                  ${{ secrets.ALCHEMY_API_KEY }}
          CASHLY_MULTISIG:                  ${{ secrets.CASHLY_MULTISIG }}
          BASESCAN_API_KEY:                 ${{ secrets.BASESCAN_API_KEY }}
          CHAINLINK_VRF_SUBSCRIPTION_ID:    ${{ secrets.CHAINLINK_VRF_SUBSCRIPTION_ID }}

      - name: Save deployment addresses
        uses: actions/upload-artifact@v4
        with:
          name: deployments-baseSepolia
          path: ${{ env.WORKING_DIR }}/deployments/baseSepolia.json
          retention-days: 30

  # ─────────────────────────────────────────────────────────
  # JOB 4: Deploy to Base Mainnet (manual only, main branch)
  # ─────────────────────────────────────────────────────────
  deploy-mainnet:
    name: Deploy to Base Mainnet
    runs-on: ubuntu-latest
    needs: test
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.deploy_network == 'base' &&
      github.ref == 'refs/heads/main'
    environment: mainnet
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: contract-artifacts
          path: ${{ env.WORKING_DIR }}/artifacts

      - name: Deploy Step 1 - AdminController
        run: npx hardhat run scripts/deploy/01_deploy_admin.ts --network base
        env:
          DEPLOYER_PRIVATE_KEY:    ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          ALCHEMY_API_KEY:         ${{ secrets.ALCHEMY_API_KEY }}
          CASHLY_MULTISIG:         ${{ secrets.CASHLY_MULTISIG }}
          BASESCAN_API_KEY:        ${{ secrets.BASESCAN_API_KEY }}

      - name: Deploy Step 2 - Core Contracts
        run: npx hardhat run scripts/deploy/02_deploy_core.ts --network base
        env:
          DEPLOYER_PRIVATE_KEY:    ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          ALCHEMY_API_KEY:         ${{ secrets.ALCHEMY_API_KEY }}
          CASHLY_MULTISIG:         ${{ secrets.CASHLY_MULTISIG }}
          BASESCAN_API_KEY:        ${{ secrets.BASESCAN_API_KEY }}

      - name: Deploy Step 3 - Lottery + Adapters
        run: npx hardhat run scripts/deploy/03_deploy_lottery.ts --network base
        env:
          DEPLOYER_PRIVATE_KEY:             ${{ secrets.DEPLOYER_PRIVATE_KEY }}
          ALCHEMY_API_KEY:                  ${{ secrets.ALCHEMY_API_KEY }}
          CASHLY_MULTISIG:                  ${{ secrets.CASHLY_MULTISIG }}
          BASESCAN_API_KEY:                 ${{ secrets.BASESCAN_API_KEY }}
          CHAINLINK_VRF_SUBSCRIPTION_ID:    ${{ secrets.CHAINLINK_VRF_SUBSCRIPTION_ID }}

      - name: Save deployment addresses
        uses: actions/upload-artifact@v4
        with:
          name: deployments-base-mainnet
          path: ${{ env.WORKING_DIR }}/deployments/base.json
          retention-days: 90
