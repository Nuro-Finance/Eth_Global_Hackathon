server {
    listen 80;
    server_name app.nuro.finance api.nuro.finance;
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name app.nuro.finance;
    ssl_certificate /etc/letsencrypt/live/app.nuro.finance/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.nuro.finance/privkey.pem;

    # Session 25 — Admin console at app.nuro.finance/admin (proxies to backend)
    location /admin {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Session 25 — Telegram webhook for growth-agent approval callbacks
    # Replaces the 10s Telegram polling with real-time webhook delivery.
    # After enabling, register the webhook URL with Telegram:
    #   curl 'https://api.telegram.org/bot<TOKEN>/setWebhook?url=https://app.nuro.finance/telegram/webhook'
    location /telegram/webhook {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Default: everything else goes to the Next.js FE
    location / {
        proxy_pass http://127.0.0.1:2800;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name api.nuro.finance;
    ssl_certificate /etc/letsencrypt/live/app.nuro.finance/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.nuro.finance/privkey.pem;
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
